apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # Note: In a real scenario, you push your image to Docker Hub first.
        # For local testing, ensure your local cluster can see your built image.
        image: blogverse-backend:latest 
        imagePullPolicy: Never 
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://database:27017/blogverse"
        resources:
          requests:
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30005